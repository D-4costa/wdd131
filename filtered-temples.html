<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temple.css">
</head>
<body>
    <header>
        <h1>Temple Picture Album</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section class="gallery">
            <article>
                <h2>Salt Lake Temple</h2>
                <img src="images/salt-lake-temple.jpg" alt="Salt Lake Temple">
            </article>
            <article>
                <h2>San Diego Temple</h2>
                <img src="images/san-diego-temple.jpg" alt="San Diego Temple">
            </article>
            <article>
                <h2>Paris Temple</h2>
                <img src="images/paris-temple.jpg" alt="Paris Temple">
            </article>
            <article>
                <h2>Rome Temple</h2>
                <img src="images/rome-temple.jpg" alt="Rome Temple">
            </article>
        </section>
    </main>

    <footer>
        <p>© Danielle Elisabeth Acosta Clavijo</p>
        <p>Last modified: <span id="lastModified"></span></p>
    </footer>

    <script>
        document.getElementById("lastModified").textContent = document.lastModified;
    </script>
</body>
</html>
