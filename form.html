<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Product Review Form | Product Reviews Inc.</title>
  <meta name="description" content="Product Review Form page for Product Reviews Inc.">
  <meta name="author" content="Danielle Acosta">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <script defer src="scripts/script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Product Review Form</h1>
      <nav class="main-nav" aria-label="Main Navigation">
        <a href="#">About</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h2>Share your experience</h2>
      <p>We appreciate your honest review. Required fields are marked with <span class="required-star">*</span>.</p>
    </section>

    <form id="reviewForm" method="get" action="review.html" novalidate>
      <fieldset class="form-group">
        <label for="product" class="label-required">Product Name <span class="required-star">*</span></label>
        <select id="product" name="product" required aria-required="true">
          <option disabled selected>Select a Product ...</option>
          <!-- Options populated by script.js -->
        </select>
      </fieldset>

      <fieldset class="form-group">
        <legend class="label-required">Overall Rating <span class="required-star">*</span></legend>
        <div class="rating" role="radiogroup" aria-labelledby="ratingLegend">
          <label for="rate5" class="visually-hidden">5 stars</label>
          <input type="radio" id="rate5" name="rating" value="5" required>
          <label for="rate4">4</label>
          <input type="radio" id="rate4" name="rating" value="4">
          <label for="rate3">3</label>
          <input type="radio" id="rate3" name="rating" value="3">
          <label for="rate2">2</label>
          <input type="radio" id="rate2" name="rating" value="2">
          <label for="rate1">1</label>
          <input type="radio" id="rate1" name="rating" value="1">
        </div>
      </fieldset>

      <fieldset class="form-group">
        <label for="installDate" class="label-required">Date of Installation <span class="required-star">*</span></label>
        <input type="date" id="installDate" name="installDate" required aria-required="true">
      </fieldset>

      <fieldset class="form-group">
        <legend>Useful Features (check all that apply)</legend>
        <div class="checkboxes">
          <input type="checkbox" id="feat1" name="features" value="easy_install">
          <label for="feat1">Easy to install</label>

          <input type="checkbox" id="feat2" name="features" value="reliable">
          <label for="feat2">Reliable</label>

          <input type="checkbox" id="feat3" name="features" value="energy_saving">
          <label for="feat3">Energy saving</label>

          <input type="checkbox" id="feat4" name="features" value="good_support">
          <label for="feat4">Good support</label>
        </div>
      </fieldset>

      <fieldset class="form-group">
        <label for="reviewText">Written Review</label>
        <textarea id="reviewText" name="reviewText" rows="6" placeholder="Write your review here..."></textarea>
      </fieldset>

      <fieldset class="form-group">
        <label for="userName">User Name</label>
        <input type="text" id="userName" name="userName" placeholder="Optional">
      </fieldset>

      <div class="form-actions">
        <input type="submit" value="Submit Review">
      </div>
    </form>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <strong>Danielle Acosta</strong> - Product Reviews Inc.</p>
      <p>Visit us • 9998 Hayes Isle, Mantefurt 03581 • 505-418-0415</p>
    </div>
  </footer>
</body>
</html>
