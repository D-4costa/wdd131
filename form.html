<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Product Review Form | Product Reviews Inc.</title>
  <meta name="description" content="Product Review Form page for Product Reviews Inc.">
  <meta name="author" content="Danielle Acosta">

  <!-- Google Fonts embed completo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/style.css">
  <script src="scripts/script.js" defer></script>
</head>
<body>
  <header>
    <h1>Product Review Form</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      <!-- Product Name -->
      <label for="productName">Product Name <span>*</span></label>
      <select id="productName" name="productName" required>
        <option value="" disabled selected>Select a Product ...</option>
      </select>

      <!-- Overall Rating -->
      <fieldset>
        <legend>Overall Rating <span>*</span></legend>
        <label><input type="radio" id="rating1" name="rating" value="1" required> 1 ☆</label>
        <label><input type="radio" id="rating2" name="rating" value="2"> 2 ☆☆</label>
        <label><input type="radio" id="rating3" name="rating" value="3"> 3 ☆☆☆</label>
        <label><input type="radio" id="rating4" name="rating" value="4"> 4 ☆☆☆☆</label>
        <label><input type="radio" id="rating5" name="rating" value="5"> 5 ☆☆☆☆☆</label>
      </fieldset>

      <!-- Date of Installation -->
      <label for="installationDate">Date of Installation <span>*</span></label>
      <input type="date" id="installationDate" name="installationDate" required>

      <!-- Useful Features -->
      <fieldset>
        <legend>Useful Features (check all that apply)</legend>
        <label><input type="checkbox" id="feature1" name="features" value="fast"> Fast Performance</label>
        <label><input type="checkbox" id="feature2" name="features" value="durable"> Durability</label>
        <label><input type="checkbox" id="feature3" name="features" value="design"> Sleek Design</label>
        <label><input type="checkbox" id="feature4" name="features" value="eco"> Eco Friendly</label>
      </fieldset>

      <!-- Written Review -->
      <label for="review">Written Review</label>
      <textarea id="review" name="review" rows="4"></textarea>

      <!-- User Name -->
      <label for="username">Your Name</label>
      <input type="text" id="username" name="username">

      <!-- Submit Button -->
      <input type="submit" value="Submit">
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Product Reviews Inc. | Danielle Acosta</p>
  </footer>
</body>
</html>
